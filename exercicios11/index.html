<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercícios - Madrassa Online</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a1f0a, #1a5f3c);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .back {
            width: 45px; height: 45px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
        }
        .progress {
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4af37, #f0d878);
            border-radius: 10px;
            transition: width 0.5s;
        }
        .questao {
            background: rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .questao h3 {
            margin-bottom: 20px;
            font-size: 1.1rem;
        }
        .opcao {
            padding: 16px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .opcao:hover { background: rgba(255,255,255,0.1); }
        .opcao.certa { border-color: #10b981; background: rgba(16,185,129,0.15); }
        .opcao.errada { border-color: #ef4444; background: rgba(239,68,68,0.15); }
        .resultado {
            text-align: center;
            padding: 50px 20px;
        }
        .resultado h2 { font-size: 3rem; color: #d4af37; margin-bottom: 10px; }
        .btn {
            padding: 14px 30px;
            background: linear-gradient(135deg, #d4af37, #c9a000);
            color: #1a1a1a;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
    </style>
</head>
<body>

<div class="header">
    <a href="../index.html" class="back"><i class="fas fa-arrow-left"></i></a>
    <h1><i class="fas fa-book-open"></i> Exercícios</h1>
</div>

<div class="progress">
    <div class="progress-fill" id="barra" style="width:0%"></div>
</div>

<div id="quiz"></div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyD2rNS7HSJyek3OCrRquudFgqQSWXZJYrY",
    authDomain: "madrassa-online-b851c.firebaseapp.com",
    databaseURL: "https://madrassa-online-b851c-default-rtdb.firebaseio.com",
    projectId: "madrassa-online-b851c",
    storageBucket: "madrassa-online-b851c.firebasestorage.app",
    messagingSenderId: "360782668012",
    appId: "1:360782668012:web:d501ef187911db632445c9"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let questoes = [];
let atual = 0;
let acertos = 0;

db.ref('exercicios/questoes').once('value').then(snap => {
    snap.forEach(item => {
        questoes.push(item.val());
    });
    
    if(questoes.length === 0) {
        document.getElementById('quiz').innerHTML = 
            '<div class="questao"><h3>Nenhuma questão cadastrada ainda.</h3></div>';
        return;
    }
    
    mostrarQuestao();
});

function mostrarQuestao() {
    if(atual >= questoes.length) {
        mostrarResultado();
        return;
    }
    
    const q = questoes[atual];
    const pct = ((atual / questoes.length) * 100);
    document.getElementById('barra').style.width = pct + '%';
    
    let html = '<div class="questao">';
    html += '<h3>Questão ' + (atual+1) + ' de ' + questoes.length + '</h3>';
    html += '<p style="margin-bottom:20px;font-size:1.1rem;">' + q.pergunta + '</p>';
    
    q.opcoes.forEach((op, i) => {
        html += '<div class="opcao" onclick="responder(' + i + ')">' + op + '</div>';
    });
    
    html += '</div>';
    document.getElementById('quiz').innerHTML = html;
}

function responder(escolha) {
    const q = questoes[atual];
    const opcoes = document.querySelectorAll('.opcao');
    
    opcoes[escolha].classList.add(escolha === q.correta ? 'certa' : 'errada');
    if(escolha !== q.correta) {
        opcoes[q.correta].classList.add('certa');
    } else {
        acertos++;
    }
    
    opcoes.forEach(o => o.style.pointerEvents = 'none');
    
    setTimeout(() => {
        atual++;
        mostrarQuestao();
    }, 1500);
}

function mostrarResultado() {
    document.getElementById('barra').style.width = '100%';
    const pct = Math.round((acertos / questoes.length) * 100);
    
    document.getElementById('quiz').innerHTML = 
        '<div class="resultado">' +
        '<h2>' + acertos + '/' + questoes.length + '</h2>' +
        '<p>' + pct + '% de acerto</p><br>' +
        '<a href="../index.html" class="btn">Voltar ao Início</a>' +
        '</div>';
}
</script>

</body>
</html>
