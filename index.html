<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrassa Online</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
</head>
<body>

    <div id="auth-container">
        <h2>Madrassa Online - Login</h2>
        <input type="text" id="nome" placeholder="Nome Completo">
        <input type="tel" id="celular" placeholder="Número de Celular">
        <input type="password" id="pin" placeholder="PIN">
        <button onclick="fazerLogin()">Entrar / Registar</button>
    </div>

    <div id="main-content" style="display: none;">
        <h1 id="welcome-msg">Bem-vindo</h1>
        
        <div class="ads-banner">
            <p>Anúncio: Conheça nossos novos cursos e serviços!</p>
        </div>

        <div class="menu-grid">
            <button onclick="window.location.href='#videoaulas'">Video Aulas</button>
            <button onclick="window.location.href='https://chat.whatsapp.com/2eKBlqoeaaJ50WtWwRkpb7?mode=gi_t'">WhatsApp Aulas</button>
            <button onclick="window.location.href='./exercicios11/'">Exercícios</button>
            <button onclick="window.location.href='./exame11/'">Exame</button>
        </div>

        <div id="admin-panel" style="display: none; margin-top: 20px; border: 1px solid red; padding: 10px;">
            <h3>Painel de Aprovação (Admin)</h3>
            <div id="lista-pendentes"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyD2rNS7HSJyek3OCrRquudFgqQSWXZJYrY",
            authDomain: "madrassa-online-b851c.firebaseapp.com",
            databaseURL: "https://madrassa-online-b851c-default-rtdb.firebaseio.com",
            projectId: "madrassa-online-b851c",
            storageBucket: "madrassa-online-b851c.firebasestorage.app",
            messagingSenderId: "360782668012",
            appId: "1:360782668012:web:d501ef187911db632445c9"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Lista de números da imagem que não precisam de aprovação
        const automaticos = ["258849235361", "258864133620", "258844030404", "258847859222", "258844906524"]; 

        function fazerLogin() {
            const nome = document.getElementById('nome').value;
            const celular = document.getElementById('celular').value;
            const pin = document.getElementById('pin').value;

            if(celular === "860407269" && nome.toUpperCase() === "ANACLETO BEBANE") {
                entrarComoUser(nome, "admin");
                return;
            }

            const userRef = database.ref('usuarios/' + celular);
            userRef.once('value', (snapshot) => {
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    if(userData.pin === pin) {
                        if(userData.status === "aprovado") {
                            entrarComoUser(nome, "aluno");
                        } else {
                            alert("Aguarde a aprovação do administrador.");
                        }
                    } else {
                        alert("PIN incorreto.");
                    }
                } else {
                    // Novo Registro
                    let statusInicial = automaticos.includes(celular) ? "aprovado" : "pendente";
                    userRef.set({
                        nome: nome,
                        pin: pin,
                        status: statusInicial
                    }).then(() => {
                        alert(statusInicial === "aprovado" ? "Conta criada! Faça login." : "Registro enviado para aprovação.");
                    });
                }
            });
        }

        function entrarComoUser(nome, cargo) {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('welcome-msg').innerText = "Olá, " + nome;
            if(cargo === "admin") {
                document.getElementById('admin-panel').style.display = 'block';
                carregarPendentes();
            }
        }

        function carregarPendentes() {
            database.ref('usuarios').orderByChild('status').equalTo('pendente').on('value', (snapshot) => {
                const lista = document.getElementById('lista-pendentes');
                lista.innerHTML = "";
                snapshot.forEach((childSnapshot) => {
                    const user = childSnapshot.val();
                    const key = childSnapshot.key;
                    lista.innerHTML += `<p>${user.nome} (${key}) <button onclick="aprovar('${key}')">Aprovar</button></p>`;
                });
            });
        }

        function aprovar(key) {
            database.ref('usuarios/' + key).update({ status: "aprovado" });
        }
    </script>
</body>
</html>
