<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Madrassa Online Islam Moçambique - 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-green: #064e3b;
            --accent-gold: #d4af37;
            --bg-cream: #fdfbf7;
            --text-dark: #1f2937;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-cream); color: var(--text-dark); line-height: 1.6; }

        .header {
            background: linear-gradient(rgba(6, 78, 59, 0.95), rgba(6, 78, 59, 0.95)), url('https://www.transparenttextures.com/patterns/arabesque.png');
            color: var(--white); padding: 3rem 1rem; text-align: center; border-bottom: 5px solid var(--accent-gold);
        }

        .timer-container {
            background: var(--white); max-width: 500px; margin: -20px auto 2rem; padding: 1rem;
            border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); display: flex; justify-content: space-around; border: 1px solid var(--accent-gold);
        }

        .timer-unit span { display: block; font-size: 1.2rem; font-weight: 700; color: var(--primary-green); }

        .btn-enroll {
            background: linear-gradient(135deg, var(--accent-gold), #b8860b);
            color: var(--primary-green); padding: 1rem 2rem; border-radius: 50px;
            font-weight: 700; border: none; cursor: pointer; text-transform: uppercase; width: 100%;
        }

        .payment-methods { display: grid; gap: 10px; margin: 15px 0; }
        .method-card {
            border: 2px solid #eee; border-radius: 12px; padding: 12px;
            display: flex; align-items: center; cursor: pointer; transition: 0.3s;
        }
        .method-card.selected { border-color: var(--accent-gold); background-color: #fffbeb; }
        .method-card input { margin-right: 10px; }
        .method-card img { height: 25px; margin-right: 10px; border-radius: 4px; }

        .method-details { background: #f4f4f4; padding: 10px; border-radius: 8px; font-size: 0.8rem; margin-top: 10px; display: none; }
        .method-details.show { display: block; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; overflow-y: auto; }
        .modal-content { background: white; width: 95%; max-width: 450px; margin: 5% auto; border-radius: 20px; padding: 2rem; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 15px; border: 1px solid #ddd; border-radius: 8px; }

        footer { text-align: center; padding: 2rem; color: #666; font-size: 0.8rem; }
    </style>
</head>
<body>

    <header class="header">
        <h1>Islam Moçambique</h1>
        <p style="color: var(--accent-gold);">Madrassa Online - Inscrições 2026</p>
    </header>

    <div class="timer-container" id="timer">
        <div class="timer-unit"><span id="days">00</span><label>Dias</label></div>
        <div class="timer-unit"><span id="hours">00</span><label>Hrs</label></div>
        <div class="timer-unit"><span id="minutes">00</span><label>Min</label></div>
        <div class="timer-unit"><span id="seconds">00</span><label>Seg</label></div>
    </div>

    <div style="text-align: center; padding: 2rem;">
        <button class="btn-enroll" onclick="toggleModal(true)" style="max-width: 300px;">✍️ Iniciar Inscrição</button>
    </div>

    <div id="enrollModal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--primary-green); text-align: center;">Ficha de Inscrição</h2>
            <form id="regForm">
                <label>Nome Completo</label>
                <input type="text" id="nome" required>
                
                <label>Telemóvel (M-Pesa / e-Mola)</label>
                <input type="tel" id="zap" required placeholder="84... / 86...">

                <label>Nível</label>
                <select id="selNivel">
                    <option>Nível 1 - Iniciante</option>
                    <option>Nível 2 - Intermediário</option>
                    <option>Nível 3 - Avançado</option>
                </select>

                <p><strong>Forma de Pagamento (100 MTN):</strong></p>
                <div class="payment-methods">
                    <label class="method-card" onclick="selectMethod('mpesa')">
                        <input type="radio" name="payMethod" value="mpesa" id="radMpesa">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/03/M-Pesa_Logo.svg/512px-M-Pesa_Logo.svg.png">
                        <span>M-Pesa (Automático)</span>
                    </label>

                    <label class="method-card" onclick="selectMethod('emola')">
                        <input type="radio" name="payMethod" value="emola">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_S-G3p2Z-yZ7-S0z8E3h3h-fG0U8Lq7h6QA&s">
                        <span>e-Mola (Automático)</span>
                    </label>

                    <label class="method-card" onclick="selectMethod('bank')">
                        <input type="radio" name="payMethod" value="bank">
                        <span>🏦 Transferência Bancária</span>
                    </label>
                </div>

                <div id="bankDetails" class="method-details">
                    <p><strong>BIM:</strong> 000100000012473356257</p>
                    <p><strong>NUIT:</strong> 201910009697381</p>
                </div>

                <button type="button" onclick="processPayment()" class="btn-enroll">Finalizar e Pagar</button>
                <button type="button" onclick="toggleModal(false)" style="width:100%; background:none; border:none; margin-top:10px; color:#999;">Cancelar</button>
            </form>
        </div>
    </div>

    <footer><p>© 2026 Madrassa Online Islam Moçambique</p></footer>

    <script>
        function toggleModal(show) { document.getElementById('enrollModal').style.display = show ? 'block' : 'none'; }

        function selectMethod(method) {
            document.querySelectorAll('.method-card').forEach(el => el.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            document.getElementById('bankDetails').classList.toggle('show', method === 'bank');
        }

        async function processPayment() {
            const nome = document.getElementById('nome').value;
            const zap = document.getElementById('zap').value;
            const nivel = document.getElementById('selNivel').value;
            const metodo = document.querySelector('input[name="payMethod"]:checked')?.value;

            if(!nome || !zap || !metodo) return alert("Preencha todos os campos.");

            const whatsappMsg = `Assalamu Alaikum! Inscrição Madrassa.%0A*Nome:* ${nome}%0A*Método:* ${metodo}%0A*Nível:* ${nivel}`;

            if(metodo === 'bank') {
                window.open(`https://wa.me/258860407269?text=${whatsappMsg}%0A_Vou enviar o comprovativo bancário._`);
                return;
            }

            alert("Aguarde o pedido de PIN no seu telemóvel...");

            try {
                await fetch('https://madrassa-online-i-m.vercel.app/api/pagar', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ msisdn: zap, amount: 100, nome: nome, provider: metodo })
                });
                window.open(`https://wa.me/258860407269?text=${whatsappMsg}%0A_Pagamento automático iniciado._`);
            } catch (e) {
                alert("Erro no sistema. Tente novamente ou use Transferência.");
            }
        }

        // Timer simples
        function updateTimer() {
            const diff = new Date('2026-04-06') - new Date();
            if (diff <= 0) return;
            document.getElementById('days').innerText = Math.floor(diff / 864e5);
            document.getElementById('hours').innerText = Math.floor((diff % 864e5) / 36e5);
            document.getElementById('minutes').innerText = Math.floor((diff % 36e5) / 6e4);
            document.getElementById('seconds').innerText = Math.floor((diff % 6e4) / 1e3);
        }
        setInterval(updateTimer, 1000);
    </script>
</body>
</html>
