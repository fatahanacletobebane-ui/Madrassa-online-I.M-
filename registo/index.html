<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo - Aulas Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #1a5f4a;
            --primary-light: #2d8b6f;
            --primary-dark: #0d3d2f;
            --accent: #d4af37;
            --bg-warm: #faf8f5;
            --bg-cream: #f5f0e8;
            --text-dark: #2c3e50;
            --text-light: #5d6d7e;
            --white: #ffffff;
            --shadow: 0 10px 40px rgba(0,0,0,0.1);
            --radius: 16px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-warm) 0%, var(--bg-cream) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .register-container {
            width: 100%;
            max-width: 600px;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .register-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 1rem;
        }

        .register-header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .register-header p { opacity: 0.9; font-size: 0.9rem; }

        .register-body { padding: 2rem; }

        .status-bar {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            display: none;
        }

        .status-bar.show { display: block; }
        .status-bar.error { background: #ffebee; border-left-color: #f44336; }
        .status-bar.success { background: #e8f5e9; border-left-color: #4caf50; }

        .form-group { margin-bottom: 1.5rem; }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .required { color: #e74c3c; margin-left: 2px; }

        .input-wrapper { position: relative; }

        .form-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid var(--bg-cream);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .referral-section {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(212, 175, 55, 0.05) 100%);
            border: 2px dashed var(--accent);
            border-radius: var(--radius-sm);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .referral-title {
            color: var(--primary-dark);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .btn-submit {
            width: 100%;
            padding: 1.25rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-submit:disabled {
            background: var(--text-light);
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .success-state {
            display: none;
            text-align: center;
            padding: 3rem 2rem;
        }

        .success-state.active { display: block; }

        .success-icon {
            width: 100px;
            height: 100px;
            background: #27ae60;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            margin: 0 auto 2rem;
        }

        .log-console {
            background: #263238;
            color: #aed581;
            padding: 1rem;
            border-radius: var(--radius-sm);
            margin-top: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            max-height: 150px;
            overflow-y: auto;
            display: none;
        }

        .log-console.show { display: block; }
        .log-console .error { color: #ef5350; }
        .log-console .success { color: #69f0ae; }
        .log-console .info { color: #81d4fa; }

        @media (max-width: 480px) {
            .register-body { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <!-- Form State -->
        <div id="formState">
            <div class="register-header">
                <div class="logo-icon">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <h1>Aulas Online</h1>
                <p>Criar nova conta de aluno</p>
            </div>

            <div class="register-body">
                <!-- Status Bar -->
                <div class="status-bar" id="statusBar">
                    <i class="fas fa-info-circle"></i>
                    <span id="statusText">Aguardando...</span>
                </div>

                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label">Nome Completo <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="text" class="form-input" id="fullName" placeholder="Seu nome completo" required>
                            <i class="fas fa-user input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Número de Telefone <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="tel" class="form-input" id="phoneNumber" placeholder="860407269" required>
                            <i class="fas fa-phone input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="email" class="form-input" id="email" placeholder="seu@email.com" required>
                            <i class="fas fa-envelope input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">PIN (4 dígitos) <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" class="form-input" id="pin" placeholder="****" required maxlength="4">
                            <i class="fas fa-lock input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirmar PIN <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" class="form-input" id="confirmPin" placeholder="****" required maxlength="4">
                            <i class="fas fa-check-circle input-icon"></i>
                        </div>
                    </div>

                    <div class="referral-section">
                        <div class="referral-title">
                            <i class="fas fa-gift"></i> Código de Convite (Opcional)
                        </div>
                        <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 1rem;">
                            Se foi convidado, insira o código. Ambos ganham 0.02 Moz Coin!
                        </p>
                        <div class="input-wrapper">
                            <input type="text" class="form-input" id="referralCode" placeholder="Ex: REF-ABC123" style="padding-left: 1rem;">
                        </div>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: flex; align-items: flex-start; gap: 0.75rem; cursor: pointer;">
                            <input type="checkbox" id="acceptTerms" required style="margin-top: 0.25rem;">
                            <span style="font-size: 0.9rem; color: var(--text-light);">
                                Aceito os Termos de Uso das Aulas Online
                            </span>
                        </label>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn">
                        <i class="fas fa-user-plus"></i>
                        <span id="btnText">Criar Conta</span>
                    </button>
                </form>

                <!-- Log Console -->
                <div class="log-console" id="logConsole"></div>
            </div>
        </div>

        <!-- Success State -->
        <div class="success-state" id="successState">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h2 style="color: var(--primary); margin-bottom: 1rem;">Registo Efectuado!</h2>
            <p style="color: var(--text-light); margin-bottom: 2rem;">
                Sua conta foi criada com sucesso!
            </p>
            <div style="background: var(--bg-cream); padding: 1.5rem; border-radius: var(--radius-sm); margin-bottom: 2rem; text-align: left;">
                <p><strong>Número:</strong> <span id="successPhone">---</span></p>
                <p><strong>Email:</strong> <span id="successEmail">---</span></p>
                <p><strong>Código:</strong> <span id="successRefCode">---</span></p>
            </div>
            <button class="btn-submit" onclick="closeWindow()">Fechar</button>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO FIREBASE - VERIFIQUE ESTES DADOS!
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyCW9ZZadm4WJ_FKtOjvkP1czsfImwzl98c",
            authDomain: "aulas-online.firebaseapp.com",
            databaseURL: "https://aulas-online-default-rtdb.firebaseio.com",
            projectId: "aulas-online",
            storageBucket: "aulas-online.appspot.com",
            messagingSenderId: "1097811611947",
            appId: "1:1097811611947:web:476c4b2e12fc4c6529756e"
        };

        // ==========================================
        // SISTEMA DE LOG VISÍVEL
        // ==========================================
        const logConsole = document.getElementById('logConsole');
        
        function log(message, type = 'info') {
            console.log(`[${type.toUpperCase()}] ${message}`);
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logConsole.appendChild(div);
            logConsole.scrollTop = logConsole.scrollHeight;
            logConsole.classList.add('show');
        }

        // ==========================================
        // INICIALIZAÇÃO DO FIREBASE
        // ==========================================
        let database;
        let isConnected = false;

        try {
            log('Inicializando Firebase...', 'info');
            const app = firebase.initializeApp(firebaseConfig);
            database = firebase.database();
            log('Firebase App criado: ' + app.name, 'success');
            
            // Verificar conexão
            database.ref('.info/connected').on('value', (snap) => {
                isConnected = snap.val();
                if (isConnected) {
                    log('✅ Conectado ao Firebase Realtime Database', 'success');
                    updateStatus('Sistema pronto para registo', 'success');
                } else {
                    log('⚠️ Desconectado do Firebase', 'error');
                    updateStatus('Sem conexão com o servidor', 'error');
                }
            });
            
        } catch (error) {
            log('❌ Erro fatal ao inicializar: ' + error.message, 'error');
            updateStatus('Erro de inicialização: ' + error.message, 'error');
        }

        function updateStatus(text, type) {
            const bar = document.getElementById('statusBar');
            const txt = document.getElementById('statusText');
            bar.className = 'status-bar show ' + type;
            txt.textContent = text;
        }

        // ==========================================
        // FUNÇÃO DE REGISTO - COM TIMEOUT E RETRY
        // ==========================================
        async function handleRegister(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            
            // Desabilitar botão
            submitBtn.disabled = true;
            btnText.textContent = 'A processar...';
            
            // Adicionar spinner
            const originalContent = submitBtn.innerHTML;
            submitBtn.innerHTML = '<span class="loading"></span> A processar...';
            
            log('Iniciando processo de registo...', 'info');
            
            // Verificar conexão primeiro
            if (!isConnected) {
                log('❌ Sem conexão com Firebase!', 'error');
                updateStatus('Sem conexão. Verifique sua internet.', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
                return;
            }
            
            // Coletar dados
            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phoneNumber').value.replace(/\D/g, '');
            const email = document.getElementById('email').value.trim();
            const pin = document.getElementById('pin').value;
            const confirmPin = document.getElementById('confirmPin').value;
            const referralCode = document.getElementById('referralCode').value.trim().toUpperCase();
            
            log(`Dados: nome="${fullName}", telefone="${phone}", email="${email}"`, 'info');
            
            // Validações
            if (phone.length < 9) {
                log('❌ Telefone inválido: ' + phone, 'error');
                updateStatus('Telefone deve ter pelo menos 9 dígitos', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
                return;
            }
            
            if (pin !== confirmPin) {
                log('❌ PINs não coincidem', 'error');
                updateStatus('Os PINs digitados não coincidem', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
                return;
            }
            
            const userId = phone;
            log('ID do usuário: ' + userId, 'info');
            
            try {
                // PASSO 1: Verificar se usuário existe (com timeout)
                log('Verificando se usuário existe...', 'info');
                updateStatus('Verificando dados...', 'info');
                
                const userSnapshot = await Promise.race([
                    database.ref('users/' + userId).once('value'),
                    new Promise((_, reject) => 
                        setTimeout(() => reject(new Error('Timeout ao verificar usuário')), 10000)
                    )
                ]);
                
                if (userSnapshot.exists()) {
                    log('⚠️ Usuário já existe: ' + userId, 'error');
                    updateStatus('Este número já está registado', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalContent;
                    return;
                }
                
                log('✅ Usuário não existe, prosseguindo...', 'success');
                
                // PASSO 2: Verificar email (opcional, não bloqueia)
                log('Verificando email...', 'info');
                try {
                    const emailSnapshot = await database.ref('users')
                        .orderByChild('email')
                        .equalTo(email)
                        .once('value');
                    
                    if (emailSnapshot.exists()) {
                        log('⚠️ Email já existe, mas continuando...', 'info');
                    }
                } catch (emailErr) {
                    log('ℹ️ Não foi possível verificar email (não crítico): ' + emailErr.message, 'info');
                }
                
                // PASSO 3: Preparar dados
                const myRefCode = 'REF-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                const userData = {
                    name: fullName,
                    phone: phone,
                    email: email,
                    pin: pin,
                    balance: 0,
                    sellerBalance: 0,
                    referralCode: myRefCode,
                    referredBy: referralCode || null,
                    createdAt: Date.now(),
                    approved: false,
                    courses: {}
                };
                
                log('Dados preparados. Código de referral: ' + myRefCode, 'info');
                updateStatus('A guardar dados...', 'info');
                
                // PASSO 4: Salvar com timeout e retry
                log('Tentando salvar no Firebase...', 'info');
                
                let saveSuccess = false;
                let attempts = 0;
                const maxAttempts = 3;
                
                while (!saveSuccess && attempts < maxAttempts) {
                    attempts++;
                    log(`Tentativa ${attempts}/${maxAttempts}...`, 'info');
                    
                    try {
                        await Promise.race([
                            database.ref('users/' + userId).set(userData),
                            new Promise((_, reject) => 
                                setTimeout(() => reject(new Error('Timeout ao salvar')), 15000)
                            )
                        ]);
                        saveSuccess = true;
                        log('✅ Dados salvos com sucesso!', 'success');
                    } catch (saveError) {
                        log(`❌ Tentativa ${attempts} falhou: ${saveError.message}`, 'error');
                        if (attempts >= maxAttempts) {
                            throw saveError;
                        }
                        // Aguardar antes de retry
                        await new Promise(r => setTimeout(r, 1000));
                    }
                }
                
                // PASSO 5: Processar referral (não bloqueia o registo)
                if (referralCode && saveSuccess) {
                    log('Processando referral...', 'info');
                    try {
                        await processReferral(referralCode, phone);
                        log('✅ Referral processado', 'success');
                    } catch (refErr) {
                        log('⚠️ Erro no referral (não crítico): ' + refErr.message, 'info');
                    }
                }
                
                // SUCESSO!
                log('🎉 REGISTO COMPLETO!', 'success');
                updateStatus('Registo efectuado com sucesso!', 'success');
                showSuccess(phone, email, myRefCode);
                
                // Notificar parent
                if (window.parent !== window) {
                    window.parent.postMessage({
                        type: 'REGISTRATION_SUCCESS',
                        userId: phone,
                        email: email
                    }, '*');
                }
                
            } catch (error) {
                log('❌ ERRO FATAL: ' + error.message, 'error');
                log('Stack: ' + (error.stack || 'N/A'), 'error');
                updateStatus('Erro: ' + error.message, 'error');
                
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
            }
        }

        // Processar Referral
        async function processReferral(refCode, newUserPhone) {
            const snapshot = await database.ref('users')
                .orderByChild('referralCode')
                .equalTo(refCode)
                .once('value');
            
            if (!snapshot.exists()) {
                log('Código de referral não encontrado: ' + refCode, 'info');
                return;
            }
            
            const referrerId = Object.keys(snapshot.val())[0];
            const referrer = snapshot.val()[referrerId];
            const newBalance = (referrer.sellerBalance || 0) + 0.02;
            
            await database.ref('users/' + referrerId + '/sellerBalance').set(newBalance);
            
            await database.ref('transactions').push({
                type: 'referral_registration',
                from: newUserPhone,
                to: referrerId,
                amount: 0.02,
                timestamp: Date.now(),
                status: 'completed'
            });
        }

        // Mostrar Sucesso
        function showSuccess(phone, email, refCode) {
            document.getElementById('formState').style.display = 'none';
            document.getElementById('successState').classList.add('active');
            document.getElementById('successPhone').textContent = phone;
            document.getElementById('successEmail').textContent = email;
            document.getElementById('successRefCode').textContent = refCode;
        }

        // Fechar Janela
        function closeWindow() {
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'CLOSE_REGISTRATION' }, '*');
            } else {
                window.location.href = '../index.html';
            }
        }

        // Format inputs
        document.getElementById('phoneNumber').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
        });

        document.getElementById('pin').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
        });

        document.getElementById('confirmPin').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
        });

        document.getElementById('referralCode').addEventListener('input', function(e) {
            this.value = this.value.toUpperCase();
        });
    </script>
</body>
</html>
