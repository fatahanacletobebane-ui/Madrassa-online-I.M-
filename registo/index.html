<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registo - Aulas Online</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --primary: #1a5f4a;
            --primary-light: #2d8b6f;
            --primary-dark: #0d3d2f;
            --accent: #d4af37;
            --bg-warm: #faf8f5;
            --bg-cream: #f5f0e8;
            --text-dark: #2c3e50;
            --text-light: #5d6d7e;
            --white: #ffffff;
            --shadow: 0 10px 40px rgba(0,0,0,0.1);
            --radius: 16px;
            --radius-sm: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--bg-warm) 0%, var(--bg-cream) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .register-container {
            width: 100%;
            max-width: 600px;
            background: var(--white);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .register-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            padding: 2rem;
            text-align: center;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 1rem;
        }

        .register-header h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
        .register-header p { opacity: 0.9; font-size: 0.9rem; }

        .register-body { padding: 2rem; }

        .alert {
            padding: 1rem;
            border-radius: var(--radius-sm);
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }

        .alert-error {
            background: #ffebee;
            border-left: 4px solid #f44336;
            color: #c62828;
        }

        .alert-success {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            color: #2e7d32;
        }

        .form-group { margin-bottom: 1.5rem; }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dark);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .required { color: #e74c3c; margin-left: 2px; }

        .input-wrapper { position: relative; }

        .form-input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid var(--bg-cream);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .input-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .referral-section {
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(212, 175, 55, 0.05) 100%);
            border: 2px dashed var(--accent);
            border-radius: var(--radius-sm);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .referral-title {
            color: var(--primary-dark);
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .btn-submit {
            width: 100%;
            padding: 1.25rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
        }

        .btn-submit:disabled {
            background: var(--text-light);
            cursor: not-allowed;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .success-state {
            display: none;
            text-align: center;
            padding: 3rem 2rem;
        }

        .success-state.active { display: block; }

        .success-icon {
            width: 100px;
            height: 100px;
            background: #27ae60;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: white;
            margin: 0 auto 2rem;
        }

        .diagnostic-panel {
            background: #263238;
            color: #aed581;
            padding: 1rem;
            border-radius: var(--radius-sm);
            margin-top: 1rem;
            font-family: 'Courier New', monospace;
            font-size: 0.75rem;
            max-height: 150px;
            overflow-y: auto;
        }

        .diagnostic-panel .error { color: #ef5350; }
        .diagnostic-panel .success { color: #69f0ae; }
        .diagnostic-panel .warning { color: #ffd54f; }
        .diagnostic-panel .info { color: #81d4fa; }

        @media (max-width: 480px) {
            .register-body { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <!-- Form State -->
        <div id="formState">
            <div class="register-header">
                <div class="logo-icon">
                    <i class="fas fa-user-graduate"></i>
                </div>
                <h1>Aulas Online</h1>
                <p>Criar nova conta de aluno</p>
            </div>

            <div class="register-body">
                <!-- Alertas -->
                <div id="alertBox" class="alert" style="display: none;"></div>

                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label class="form-label">Nome Completo <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="text" class="form-input" id="fullName" placeholder="Seu nome completo" required>
                            <i class="fas fa-user input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Número de Telefone <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="tel" class="form-input" id="phoneNumber" placeholder="860407269" required>
                            <i class="fas fa-phone input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="email" class="form-input" id="email" placeholder="seu@email.com" required>
                            <i class="fas fa-envelope input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">PIN (4 dígitos) <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" class="form-input" id="pin" placeholder="****" required maxlength="4">
                            <i class="fas fa-lock input-icon"></i>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Confirmar PIN <span class="required">*</span></label>
                        <div class="input-wrapper">
                            <input type="password" class="form-input" id="confirmPin" placeholder="****" required maxlength="4">
                            <i class="fas fa-check-circle input-icon"></i>
                        </div>
                    </div>

                    <div class="referral-section">
                        <div class="referral-title">
                            <i class="fas fa-gift"></i> Código de Convite (Opcional)
                        </div>
                        <p style="font-size: 0.9rem; color: var(--text-light); margin-bottom: 1rem;">
                            Se foi convidado, insira o código. Ambos ganham 0.02 Moz Coin!
                        </p>
                        <div class="input-wrapper">
                            <input type="text" class="form-input" id="referralCode" placeholder="Ex: REF-ABC123" style="padding-left: 1rem;">
                        </div>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <label style="display: flex; align-items: flex-start; gap: 0.75rem; cursor: pointer;">
                            <input type="checkbox" id="acceptTerms" required style="margin-top: 0.25rem;">
                            <span style="font-size: 0.9rem; color: var(--text-light);">
                                Aceito os Termos de Uso das Aulas Online
                            </span>
                        </label>
                    </div>

                    <button type="submit" class="btn-submit" id="submitBtn" disabled>
                        <i class="fas fa-user-plus"></i>
                        <span id="btnText">A conectar...</span>
                    </button>
                </form>

                <!-- Painel de Diagnóstico -->
                <div class="diagnostic-panel" id="diagnosticPanel">
                    <div><strong>Diagnóstico:</strong></div>
                </div>
            </div>
        </div>

        <!-- Success State -->
        <div class="success-state" id="successState">
            <div class="success-icon">
                <i class="fas fa-check"></i>
            </div>
            <h2 style="color: var(--primary); margin-bottom: 1rem;">Registo Efectuado!</h2>
            <p style="color: var(--text-light); margin-bottom: 2rem;">
                Sua conta foi criada com sucesso!
            </p>
            <div style="background: var(--bg-cream); padding: 1.5rem; border-radius: var(--radius-sm); margin-bottom: 2rem; text-align: left;">
                <p><strong>Número:</strong> <span id="successPhone">---</span></p>
                <p><strong>Email:</strong> <span id="successEmail">---</span></p>
                <p><strong>Código:</strong> <span id="successRefCode">---</span></p>
            </div>
            <button class="btn-submit" onclick="closeWindow()">Fechar</button>
        </div>
    </div>

    <script>
        // ==========================================
        // CONFIGURAÇÃO FIREBASE CORRETA - MADRASSA ONLINE
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyD2rNS7HSJyek3OCrRquudFgqQSWXZJYrY",
            authDomain: "madrassa-online-b851c.firebaseapp.com",
            databaseURL: "https://madrassa-online-b851c-default-rtdb.firebaseio.com",
            projectId: "madrassa-online-b851c",
            storageBucket: "madrassa-online-b851c.firebasestorage.app",
            messagingSenderId: "360782668012",
            appId: "1:360782668012:web:d501ef187911db632445c9",
            measurementId: "G-RV9GD4S22T"
        };

        // ==========================================
        // SISTEMA DE LOG
        // ==========================================
        const diagnosticPanel = document.getElementById('diagnosticPanel');
        const alertBox = document.getElementById('alertBox');
        const submitBtn = document.getElementById('submitBtn');
        const btnText = document.getElementById('btnText');

        function log(message, type = 'info') {
            const time = new Date().toLocaleTimeString('pt-PT', {hour12: false});
            const div = document.createElement('div');
            div.className = type;
            div.textContent = `[${time}] ${message}`;
            diagnosticPanel.appendChild(div);
            diagnosticPanel.scrollTop = diagnosticPanel.scrollHeight;
            console.log(`[${type.toUpperCase()}] ${message}`);
        }

        function showAlert(message, type = 'error') {
            alertBox.className = 'alert alert-' + type;
            alertBox.textContent = message;
            alertBox.style.display = 'block';
        }

        function hideAlert() {
            alertBox.style.display = 'none';
        }

        // ==========================================
        // INICIALIZAÇÃO DO FIREBASE
        // ==========================================
        let database = null;
        let isConnected = false;

        async function initializeFirebase() {
            log('Iniciando Firebase...', 'info');
            
            try {
                // Verificar SDK
                if (typeof firebase === 'undefined') {
                    throw new Error('Firebase SDK não carregado');
                }
                
                // Inicializar
                let app;
                if (firebase.apps.length === 0) {
                    app = firebase.initializeApp(firebaseConfig);
                    log('✅ Firebase inicializado: ' + app.name, 'success');
                } else {
                    app = firebase.app();
                    log('Usando app existente', 'warning');
                }
                
                // Obter database
                database = firebase.database();
                log('✅ Database obtido', 'success');
                
                // Testar conexão
                log('Testando conexão...', 'info');
                const connectedRef = database.ref('.info/connected');
                
                connectedRef.on('value', (snap) => {
                    const connected = snap.val();
                    
                    if (connected === true && !isConnected) {
                        isConnected = true;
                        log('🎉 CONECTADO!', 'success');
                        enableForm();
                    } else if (connected === false && isConnected) {
                        isConnected = false;
                        log('⚠️ Desconectado', 'warning');
                        disableForm();
                    }
                });
                
                // Timeout de segurança
                setTimeout(() => {
                    if (!isConnected) {
                        log('⚠️ Timeout - verificando status manualmente...', 'warning');
                        // Tentar operação simples
                        testConnection();
                    }
                }, 5000);
                
            } catch (error) {
                log('❌ ERRO: ' + error.message, 'error');
                showAlert('Erro ao conectar: ' + error.message, 'error');
            }
        }

        async function testConnection() {
            try {
                // Tentar escrita de teste
                const testRef = database.ref('_test/connection');
                await testRef.set({timestamp: Date.now(), test: true});
                await testRef.remove();
                
                log('✅ Teste de escrita OK!', 'success');
                isConnected = true;
                enableForm();
            } catch (e) {
                log('❌ Teste falhou: ' + e.message, 'error');
                showAlert('Não foi possível conectar ao Firebase. Verifique as regras de segurança.', 'error');
            }
        }

        function enableForm() {
            submitBtn.disabled = false;
            btnText.textContent = 'Criar Conta';
            hideAlert();
            showAlert('Sistema pronto!', 'success');
        }

        function disableForm() {
            submitBtn.disabled = true;
            btnText.textContent = 'Sem conexão...';
        }

        // ==========================================
        // FUNÇÃO DE REGISTO
        // ==========================================
        async function handleRegister(e) {
            e.preventDefault();
            
            if (!isConnected || !database) {
                showAlert('Aguarde a conexão...', 'error');
                return;
            }
            
            const originalContent = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loading"></span> A processar...';
            hideAlert();
            
            // Coletar dados
            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phoneNumber').value.replace(/\D/g, '');
            const email = document.getElementById('email').value.trim();
            const pin = document.getElementById('pin').value;
            const confirmPin = document.getElementById('confirmPin').value;
            const referralCode = document.getElementById('referralCode').value.trim().toUpperCase();
            
            log(`Registo: ${fullName} (${phone})`, 'info');
            
            // Validações
            if (phone.length < 9) {
                showAlert('Telefone inválido', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
                return;
            }
            
            if (pin !== confirmPin) {
                showAlert('PINs não coincidem', 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
                return;
            }
            
            const userId = phone;
            
            try {
                // Verificar se existe
                log('Verificando usuário...', 'info');
                const snapshot = await database.ref('users/' + userId).once('value');
                
                if (snapshot.exists()) {
                    showAlert('Número já registado!', 'error');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalContent;
                    return;
                }
                
                // Criar dados
                const myRefCode = 'REF-' + Math.random().toString(36).substr(2, 6).toUpperCase();
                const userData = {
                    name: fullName,
                    phone: phone,
                    email: email,
                    pin: pin,
                    balance: 0,
                    sellerBalance: 0,
                    referralCode: myRefCode,
                    referredBy: referralCode || null,
                    createdAt: Date.now(),
                    approved: false,
                    courses: {}
                };
                
                log('Salvando...', 'info');
                await database.ref('users/' + userId).set(userData);
                log('✅ Salvo!', 'success');
                
                // Processar referral
                if (referralCode) {
                    try {
                        await processReferral(referralCode, phone);
                    } catch (e) {
                        log('Referral falhou (não crítico)', 'warning');
                    }
                }
                
                // Sucesso!
                log('🎉 REGISTO COMPLETO!', 'success');
                showSuccess(phone, email, myRefCode);
                
                // Notificar parent
                if (window.parent !== window) {
                    window.parent.postMessage({
                        type: 'REGISTRATION_SUCCESS',
                        userId: phone,
                        email: email
                    }, '*');
                }
                
            } catch (error) {
                log('❌ ERRO: ' + error.message, 'error');
                showAlert('Erro: ' + error.message, 'error');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalContent;
            }
        }

        async function processReferral(refCode, newUserPhone) {
            const snapshot = await database.ref('users')
                .orderByChild('referralCode')
                .equalTo(refCode)
                .once('value');
            
            if (!snapshot.exists()) return;
            
            const referrerId = Object.keys(snapshot.val())[0];
            const referrer = snapshot.val()[referrerId];
            const newBalance = (referrer.sellerBalance || 0) + 0.02;
            
            await database.ref('users/' + referrerId + '/sellerBalance').set(newBalance);
            
            await database.ref('transactions').push({
                type: 'referral_registration',
                from: newUserPhone,
                to: referrerId,
                amount: 0.02,
                timestamp: Date.now(),
                status: 'completed'
            });
        }

        function showSuccess(phone, email, refCode) {
            document.getElementById('formState').style.display = 'none';
            document.getElementById('successState').classList.add('active');
            document.getElementById('successPhone').textContent = phone;
            document.getElementById('successEmail').textContent = email;
            document.getElementById('successRefCode').textContent = refCode;
        }

        function closeWindow() {
            if (window.parent !== window) {
                window.parent.postMessage({ type: 'CLOSE_REGISTRATION' }, '*');
            } else {
                window.location.href = '../index.html';
            }
        }

        // Format inputs
        document.getElementById('phoneNumber').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
        });

        document.getElementById('pin').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
        });

        document.getElementById('confirmPin').addEventListener('input', function(e) {
            this.value = this.value.replace(/\D/g, '');
        });

        document.getElementById('referralCode').addEventListener('input', function(e) {
            this.value = this.value.toUpperCase();
        });

        // Iniciar
        window.onload = initializeFirebase;
    </script>
</body>
</html>
